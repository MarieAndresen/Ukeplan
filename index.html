<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukeplan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #28a745;
            color: white;
        }
        td input {
            width: 100%;
            padding: 10px;
            height: 80px;
            margin-top: 5px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .section-header {
            background-color: #f8f9fa;
            font-weight: bold;
            padding: 5px 0;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Min Ukeplan</h1>
        <table>
            <thead>
                <tr>
                    <th>Dag</th>
                    <th>Morgen</th>
                    <th>Ettermiddag</th>
                    <th>Kveld</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mandag</td>
                    <td><input type="text" id="mon-morning"></td>
                    <td><input type="text" id="mon-afternoon"></td>
                    <td><input type="text" id="mon-evening"></td>
                </tr>
                <tr>
                    <td>Tirsdag</td>
                    <td><input type="text" id="tue-morning"></td>
                    <td><input type="text" id="tue-afternoon"></td>
                    <td><input type="text" id="tue-evening"></td>
                </tr>
                <tr>
                    <td>Onsdag</td>
                    <td><input type="text" id="wed-morning"></td>
                    <td><input type="text" id="wed-afternoon"></td>
                    <td><input type="text" id="wed-evening"></td>
                </tr>
                <tr>
                    <td>Torsdag</td>
                    <td><input type="text" id="thu-morning"></td>
                    <td><input type="text" id="thu-afternoon"></td>
                    <td><input type="text" id="thu-evening"></td>
                </tr>
                <tr>
                    <td>Fredag</td>
                    <td><input type="text" id="fri-morning"></td>
                    <td><input type="text" id="fri-afternoon"></td>
                    <td><input type="text" id="fri-evening"></td>
                </tr>
                <tr>
                    <td>Lørdag</td>
                    <td><input type="text" id="sat-morning"></td>
                    <td><input type="text" id="sat-afternoon"></td>
                    <td><input type="text" id="sat-evening"></td>
                </tr>
                <tr>
                    <td>Søndag</td>
                    <td><input type="text" id="sun-morning"></td>
                    <td><input type="text" id="sun-afternoon"></td>
                    <td><input type="text" id="sun-evening"></td>
                </tr>
            </tbody>
        </table>
        <button id="saveButton">Lagre Plan</button>
        <button id="clearButton">Tøm Plan</button>
    </div>

    <script>
        // Lagre plan til lokal lagring
        function savePlan() {
            let plan = {
                "mon": {
                    morning: document.getElementById("mon-morning").value,
                    afternoon: document.getElementById("mon-afternoon").value,
                    evening: document.getElementById("mon-evening").value
                },
                "tue": {
                    morning: document.getElementById("tue-morning").value,
                    afternoon: document.getElementById("tue-afternoon").value,
                    evening: document.getElementById("tue-evening").value
                },
                "wed": {
                    morning: document.getElementById("wed-morning").value,
                    afternoon: document.getElementById("wed-afternoon").value,
                    evening: document.getElementById("wed-evening").value
                },
                "thu": {
                    morning: document.getElementById("thu-morning").value,
                    afternoon: document.getElementById("thu-afternoon").value,
                    evening: document.getElementById("thu-evening").value
                },
                "fri": {
                    morning: document.getElementById("fri-morning").value,
                    afternoon: document.getElementById("fri-afternoon").value,
                    evening: document.getElementById("fri-evening").value
                },
                "sat": {
                    morning: document.getElementById("sat-morning").value,
                    afternoon: document.getElementById("sat-afternoon").value,
                    evening: document.getElementById("sat-evening").value
                },
                "sun": {
                    morning: document.getElementById("sun-morning").value,
                    afternoon: document.getElementById("sun-afternoon").value,
                    evening: document.getElementById("sun-evening").value
                }
            };

            localStorage.setItem("ukeplan", JSON.stringify(plan));
            alert("Planen er lagret!");
        }

        // Last inn plan fra lokal lagring
        function loadPlan() {
            let plan = JSON.parse(localStorage.getItem("ukeplan"));
            if (plan) {
                document.getElementById("mon-morning").value = plan.mon.morning;
                document.getElementById("mon-afternoon").value = plan.mon.afternoon;
                document.getElementById("mon-evening").value = plan.mon.evening;

                document.getElementById("tue-morning").value = plan.tue.morning;
                document.getElementById("tue-afternoon").value = plan.tue.afternoon;
                document.getElementById("tue-evening").value = plan.tue.evening;

                document.getElementById("wed-morning").value = plan.wed.morning;
                document.getElementById("wed-afternoon").value = plan.wed.afternoon;
                document.getElementById("wed-evening").value = plan.wed.evening;

                document.getElementById("thu-morning").value = plan.thu.morning;
                document.getElementById("thu-afternoon").value = plan.thu.afternoon;
                document.getElementById("thu-evening").value = plan.thu.evening;

                document.getElementById("fri-morning").value = plan.fri.morning;
                document.getElementById("fri-afternoon").value = plan.fri.afternoon;
                document.getElementById("fri-evening").value = plan.fri.evening;

                document.getElementById("sat-morning").value = plan.sat.morning;
                document.getElementById("sat-afternoon").value = plan.sat.afternoon;
                document.getElementById("sat-evening").value = plan.sat.evening;

                document.getElementById("sun-morning").value = plan.sun.morning;
                document.getElementById("sun-afternoon").value = plan.sun.afternoon;
                document.getElementById("sun-evening").value = plan.sun.evening;
            }
        }

        // Tøm plan fra lokal lagring
        function clearPlan() {
            localStorage.removeItem("ukeplan");
            document.querySelectorAll("input").forEach(input => input.value = "");
            alert("Planen er tømt!");
        }

        // Kall funksjonene ved siden av knapper
        document.getElementById("saveButton").addEventListener("click", savePlan);
        document.getElementById("clearButton").addEventListener("click", clearPlan);

        // Last inn plan når siden lastes
        loadPlan();
    </script>
</body>
</html>
